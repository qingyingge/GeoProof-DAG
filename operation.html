<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作面板 | GeoProof-DAG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/operation.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.svg" alt="Logo" class="logo-img">
                <span>GeoProof-DAG</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> 主页</a></li>
                <li><a href="operation.html" class="active"><i class="fas fa-sliders-h"></i> 操作面板</a></li>
                <li><a href="help.html"><i class="fas fa-question-circle"></i> 帮助</a></li>
                <li><a href="support.html"><i class="fas fa-headset"></i> 支持</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="operation-main">
        <div class="dag-editor">
            <div class="dag-container">
                <div class="canvas-area">
                    <canvas id="dagCanvas" width="1000" height="650" style="width:1000px;height:650px;"></canvas>
                </div>
                <div class="info-bar">
                    <span>📐 体育场形 DAG 编辑器</span>
                    <span class="status" id="globalStatus">⚡ 就绪</span>
                    <span>✨ 单击空白添加点 | 拖动点移动 | 单击点u → 单击点v 添加边 | 单击点/边 查看详情</span>
                </div>
            </div>
        </div>
    </main>

    <div id="detailModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">节点详情</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="nodeSpecificFields" style="display: none;">
                    <div class="field">
                        <label>📝 内容 (节点文字)</label>
                        <input type="text" id="nodeContentInput" placeholder="节点显示文本">
                    </div>
                </div>
                <div class="field">
                    <label>💬 注释</label>
                    <textarea id="commentInput" rows="3" placeholder="添加注释..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="deleteItemBtn" class="btn-delete">🗑️ 删除</button>
                <button id="cancelModalBtn" class="btn-cancel">取消</button>
                <button id="saveModalBtn" class="btn-save">保存</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 GeoProof-DAG | 开发者: 1 人 · 开源在 GitHub</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/operation.js"></script>
</body>
</html>
