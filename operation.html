<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作面板 | GeoProof-DAG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/operation.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="operation-body">
    <a href="index.html" class="operation-logo">
        <span class="logo-text">GeoProof-DAG</span>
    </a>

    <main class="operation-main">
        <div class="dag-full-editor">
            <div class="canvas-area">
                <canvas id="dagCanvas"></canvas>
            </div>
            <div class="info-bar">
                <span>📐 多形状 DAG 编辑器（全屏）</span>
                <span class="status" id="globalStatus">⚡ 就绪</span>
                <span>✨ 单击节点连线 | 双击节点编辑 | 单击边修改注释 | 拖拽移动 | 空白处加点</span>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/operation_core.js"></script>
    <script src="js/operation_ui.js"></script>
</body>
</html>
