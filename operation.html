<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作面板 | GeoProof-DAG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 全屏编辑器专用样式（覆盖全局布局，使编辑器区域填满剩余空间） */
        .dag-full-editor {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 70px - 120px); /* 减去导航栏和页脚的大约高度，实际由flex自动调节 */
            min-height: 500px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        /* 针对不同屏幕，使用flex自适应 */
        .operation-main {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 0 !important;
            margin: 0 !important;
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main.operation-main {
            flex: 1;
            padding: 20px;
            margin: 0;
        }
        .dag-full-editor .canvas-area {
            flex: 1;
            background: #ffffff;
            overflow: auto;
            position: relative;
        }
        .dag-full-editor canvas {
            display: block;
            background: #fefefe;
            cursor: crosshair;
            background-image: 
                linear-gradient(to right, #e9ecef 1px, transparent 1px),
                linear-gradient(to bottom, #e9ecef 1px, transparent 1px);
            background-size: 20px 20px;
            width: 100%;
            height: 100%;
        }
        .dag-full-editor .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.8rem;
            color: #334155;
            background: #f8fafc;
            padding: 8px 20px;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        .dag-full-editor .status {
            background: #eef2ff;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: #1e40af;
        }
        .dag-full-editor button {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .dag-full-editor button:hover {
            background: #e2e8f0;
        }
        /* 模态框样式已内嵌于脚本创建的 DOM 中，无需额外定义 */
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.svg" alt="Logo" class="logo-img">
                <span>GeoProof-DAG</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> 主页</a></li>
                <li><a href="operation.html" class="active"><i class="fas fa-sliders-h"></i> 操作面板</a></li>
                <li><a href="help.html"><i class="fas fa-question-circle"></i> 帮助</a></li>
                <li><a href="support.html"><i class="fas fa-headset"></i> 支持</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="operation-main">
        <div class="dag-full-editor">
            <div class="canvas-area">
                <canvas id="dagCanvas"></canvas>
            </div>
            <div class="info-bar">
                <span>📐 体育场形 DAG 编辑器（全屏）</span>
                <span class="status" id="globalStatus">⚡ 就绪</span>
                <span>✨ 单击节点连线 | 双击节点编辑 | 单击边修改注释 | 拖拽移动 | 空白处加点</span>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 GeoProof-DAG | 开发者: 1 人 · 开源在 GitHub</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <!-- 模态框结构（由脚本动态生成，此处无需再写） -->
    <script src="js/main.js"></script>
    <script src="js/operation.js"></script>
</body>
</html>
