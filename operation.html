<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作面板 | GeoProof-DAG</title>
    <!-- 全局样式（导航、页脚、基础布局） -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 操作页面专用样式 -->
    <link rel="stylesheet" href="css/operation.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.svg" alt="Logo" class="logo-img">
                <span>GeoProof-DAG</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> 主页</a></li>
                <li><a href="operation.html" class="active"><i class="fas fa-sliders-h"></i> 操作面板</a></li>
                <li><a href="help.html"><i class="fas fa-question-circle"></i> 帮助</a></li>
                <li><a href="support.html"><i class="fas fa-headset"></i> 支持</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="operation-main">
        <div class="dag-full-editor">
            <div class="canvas-area">
                <canvas id="dagCanvas"></canvas>
            </div>
            <div class="info-bar">
                <span>📐 体育场形 DAG 编辑器（全屏）</span>
                <span class="status" id="globalStatus">⚡ 就绪</span>
                <span>✨ 单击节点连线 | 双击节点编辑 | 单击边修改注释 | 拖拽移动 | 空白处加点</span>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 GeoProof-DAG | 开发者: 1 人 · 开源在 GitHub</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/operation.js"></script>
</body>
</html>
