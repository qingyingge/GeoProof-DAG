<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术支持 | GeoProof-DAG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.svg" alt="Logo" class="logo-img">
                <span>GeoProof-DAG</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> 主页</a></li>
                <li><a href="operation.html"><i class="fas fa-sliders-h"></i> 操作面板</a></li>
                <li><a href="help.html"><i class="fas fa-question-circle"></i> 帮助</a></li>
                <li><a href="support.html" class="active"><i class="fas fa-headset"></i> 支持</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>
    <main class="support-main">
        <section class="support-section">
            <h1>支持页面已移除</h1>
            <p>支持页面内容已被移除。如需联系，请在仓库中查看贡献者信息或在 Issue 中提交问题。</p>
            <p><a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> 返回主页</a></p>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 GeoProof-DAG | 开发者: 1 人 · 开源在 GitHub</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // 简单表单提交模拟（实际应发送到后端）
        document.getElementById('supportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const feedback = document.getElementById('formFeedback');
            feedback.textContent = '感谢您的反馈，我们会尽快联系您！';
            feedback.style.color = '#2ecc71';
            this.reset();
            setTimeout(() => { feedback.textContent = ''; }, 3000);
        });
    </script>
</body>
</html>
