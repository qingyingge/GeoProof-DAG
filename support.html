<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术支持 | GeoProof-DAG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.svg" alt="Logo" class="logo-img">
                <span>GeoProof-DAG</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> 主页</a></li>
                <li><a href="operation.html"><i class="fas fa-sliders-h"></i> 操作面板</a></li>
                <li><a href="help.html"><i class="fas fa-question-circle"></i> 帮助</a></li>
                <li><a href="support.html" class="active"><i class="fas fa-headset"></i> 支持</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="support-main">
        <div class="support-container">
            <div class="support-info">
                <h1><i class="fas fa-life-ring"></i> 获取支持</h1>
                <p>我们随时为您提供帮助。您可以通过以下方式联系我们，或直接填写表单，我们会尽快回复。</p>
                <div class="contact-methods">
                    <div class="method">
                        <i class="fas fa-phone-alt"></i>
                        <h3>电话热线</h3>
                        <p>400-123-4567<br>周一至周五 9:00-18:00</p>
                    </div>
                    <div class="method">
                        <i class="fas fa-envelope"></i>
                        <h3>电子邮件</h3>
                        <p>support@lingdongtech.com</p>
                    </div>
                    <div class="method">
                        <i class="fab fa-weixin"></i>
                        <h3>微信公众号</h3>
                        <p>GeoProof-DAG</p>
                    </div>
                </div>
                <img src="images/support-illustration.svg" alt="support illustration" class="support-illustration">
            </div>

            <div class="support-form">
                <h2>提交工单</h2>
                <form id="supportForm">
                    <label for="name">姓名 *</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">邮箱 *</label>
                    <input type="email" id="email" name="email" required>

                    <label for="subject">问题主题 *</label>
                    <input type="text" id="subject" name="subject" required>

                    <label for="message">详细描述 *</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <button type="submit" class="btn btn-primary">提交工单</button>
                </form>
                <p id="formFeedback" class="feedback"></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 GeoProof-DAG | 开发者: 1 人 · 开源在 GitHub</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // 简单表单提交模拟（实际应发送到后端）
        document.getElementById('supportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const feedback = document.getElementById('formFeedback');
            feedback.textContent = '感谢您的反馈，我们会尽快联系您！';
            feedback.style.color = '#2ecc71';
            this.reset();
            setTimeout(() => { feedback.textContent = ''; }, 3000);
        });
    </script>
</body>
</html>
