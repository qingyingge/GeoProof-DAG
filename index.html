<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 | GeoProof-DAG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.svg" alt="Logo" class="logo-img">
                <span>GeoProof-DAG</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="active"><i class="fas fa-home"></i> 主页</a></li>
                <li><a href="operation.html"><i class="fas fa-sliders-h"></i> 操作面板</a></li>
                <li><a href="help.html"><i class="fas fa-question-circle"></i> 帮助</a></li>
                <li><a href="support.html"><i class="fas fa-headset"></i> 支持</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>探索数字未来</h1>
                <p>简洁 · 高效 · 智能的工作平台，助力您的每一次创造</p>
                <a href="operation.html" class="btn btn-primary"><i class="fas fa-rocket"></i> 立即体验</a>
            </div>
            <div class="hero-image">
                <img src="images/banner.svg" alt="banner illustration">
            </div>
        </section>

        <section class="features">
            <h2>平台优势</h2>
            <div class="card-grid">
                <div class="card">
                    <img src="images/icon1.svg" alt="图标1" class="card-icon">
                    <h3>智能操作</h3>
                    <p>强大的交互式操作面板，集成实用JS工具，让工作更高效。</p>
                </div>
                <div class="card">
                    <img src="images/icon2.svg" alt="图标2" class="card-icon">
                    <h3>文档中心</h3>
                    <p>详尽的帮助文档与指南，快速上手，轻松解决疑惑。</p>
                </div>
                <div class="card">
                    <img src="images/icon3.svg" alt="图标3" class="card-icon">
                    <h3>专业支持</h3>
                    <p>7x24小时离线，没有技术支持，贴心服务，保障业务连续性。</p>
                </div>
            </div>
        </section>

        <section class="intro">
            <div class="intro-text">
                <h2>关于我们</h2>
                <p>还没写</p>
                <p>所有页面均适配移动端，图片与文档已预留对应文件夹，满足快速部署需求。</p>
            </div>
            <div class="intro-image">
                <img src="images/about.svg" alt="about illustration">
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 GeoProof-DAG | 开发者: 1 人 · 开源在 GitHub</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
